<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking de Torneo Gamer</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .arcade-box {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    .blink-warning {
      font-size: 2rem;
      font-weight: bold;
      padding: 18px 30px;
      border-radius: 14px;
      animation: parpadear 1s infinite;
      box-shadow: 0 0 20px rgba(255, 193, 7, 0.6);
    }

    @keyframes parpadear {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.35;
        transform: scale(1.03);
      }
    }

    .subtitle {
      color: #f8f9fa;
      margin-top: 20px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="arcade-box">
    <h1 class="text-warning fw-bold mb-4">Ranking de Torneo Gamer</h1>

    <div class="btn btn-warning blink-warning">
      Debes abrir la consola para ver los resultados
    </div>

    <p class="subtitle">
      Presiona <strong>F12</strong> y entra en <strong>Console</strong>
    </p>
  </div>

  <script src="torneo.js"></script>

</body>
</html>
